        const video = document.getElementById("robotVideo");
const source = document.getElementById("videoSource");

let isFirstVideo = true;
let isSecondVideo = false; 
let clickTimeout;

video.addEventListener("click", function () {
    clearTimeout(clickTimeout);
    clickTimeout = setTimeout(() => {
        if (isFirstVideo) {
            switchVideo("vid2.mp4"); 
            isFirstVideo = false;
            isSecondVideo = true;
        }
    }, 250); 
});

video.addEventListener("dblclick", function () {
    clearTimeout(clickTimeout); 
    switchVideo("flip4.mp4"); 
    isFirstVideo = false;
    isSecondVideo = false;
});

video.addEventListener("ended", function () {
    if (!isFirstVideo) {
        switchVideo("vid3.mp4"); 
        isFirstVideo = true;
        isSecondVideo = false;
    }
});

function switchVideo(videoFile) {
    source.src = videoFile;
    video.loop = videoFile === "vid3.mp4";
    video.load();
    video.play();
}

        document.addEventListener("DOMContentLoaded", function () {
            pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";
            const pdfContainer = document.getElementById("pdfContainer");
            let pdfDoc = null;
            let currentPage = 1;
            let pdfPages = []; 
            let selectedPages = new Set(); 
            const scale = 1; 
        
           
            const pdfUrlParams = new URLSearchParams(window.location.search);
            const pdfFile = pdfUrlParams.get("pdf");
        
            if (pdfFile) {
                loadPDF(decodeURIComponent(pdfFile));
            } else {
                console.error("No PDF file specified in URL.");
            }
        
            function loadPDF(url) {
                pdfjsLib.getDocument(url).promise.then(pdf => {
                    pdfDoc = pdf;
                    
                    
                    let textPromises = [];
                    for (let i = 1; i <= pdf.numPages; i++) {
                        textPromises.push(extractTextFromPage(pdf, i));
                    }
        
                    Promise.all(textPromises).then(texts => {
                        pdfPages = texts;
                        renderPage(currentPage);
                    });
                }).catch(error => console.error("Error loading PDF:", error));
            }
        
            function extractTextFromPage(pdf, pageNum) {
                return pdf.getPage(pageNum).then(page => {
                    return page.getTextContent().then(textContent => {
                        return textContent.items.map(item => item.str).join(" ");
                    });
                });
            }
        
            function renderPage(pageNum) {
                pdfDoc.getPage(pageNum).then(page => {
                    let canvas = document.createElement("canvas");
                    let ctx = canvas.getContext("2d");
                    let viewport = page.getViewport({ scale });
        
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    canvas.classList.add("page-card");
        
                    let renderTask = page.render({ canvasContext: ctx, viewport });
        
                    renderTask.promise.then(() => {
                        pdfContainer.innerHTML = "";
                        pdfContainer.appendChild(canvas);
                    });
        
                    
                    canvas.addEventListener("click", function () {
                        togglePageSelection(pageNum, canvas);
                    });
        
                    
                    if (selectedPages.has(pageNum)) {
                        canvas.style.border = "4px solid orange";
                    }
                }).catch(error => console.error("Error rendering page:", error));
            }
        
            function prevPage() {
                if (currentPage > 1) {
                    currentPage--;
                    renderPage(currentPage);
                }
            }
        
            function nextPage() {
                if (currentPage < pdfDoc.numPages) {
                    currentPage++;
                    renderPage(currentPage);
                }
            }
        
            function togglePageSelection(pageNum, pageDiv) {
                if (selectedPages.has(pageNum)) {
                    selectedPages.delete(pageNum);
                    pageDiv.style.border = "2px solid white";
                } else {
                    selectedPages.add(pageNum);
                    pageDiv.style.border = "4px solid orange";
                }
            }
        
            function getSelectedText() {
                return Array.from(selectedPages).map(pageNum => pdfPages[pageNum - 1]).join("\n");
            }

            async function askGemini(isFullFile) {
                const cont = document.querySelector(".chatting");
                const userQuestion = document.getElementById("question").value.trim();
                
                const quest = document.createElement("div");
                quest.classList.add("question");
                
                if (!userQuestion) {
                    alert("Please enter a question.");
                    return;
                }
            
                quest.innerText = userQuestion;
                cont.appendChild(quest);
            
                const selectedText = isFullFile ? pdfPages.join("\n") : getSelectedText();
                
                if (!selectedText) {
                    alert("No pages selected!");
                    return;
                }
            
                const requestBody = {
                    contents: [{ parts: [{ text: selectedText + "\n\n" + userQuestion + 
                        "\n\nAnswer in bullet points only. If the answer is not available, say 'Can't provide an answer'." +
                        "Always answer from the text. General Answer Format for 7 marks:" +
                        "Definition/Introduction (1-2 sentences), Key Points with brief explanation (at least 7 key points, preferably in bullet points)," }] }]
                };
            
                try {
                    const response = await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(requestBody)
                    });
            
                    const data = await response.json();
                    console.log("Raw AI Response:", data);
            
                    const resp = document.createElement("div");
                    resp.classList.add("light");
            
                    if (data && data.candidates) {
                        let aiResponse = data.candidates[0].content.parts[0].text;
                        console.log("Formatted AI Response Before Processing:", aiResponse);
                        resp.innerHTML = formatResponse(aiResponse);
                        cont.appendChild(resp);
                    } else {
                        resp.innerText = "No valid response from AI.";
                        cont.appendChild(resp);
                    }
                } catch (error) {
                    console.error("Error fetching response:", error);
                    document.getElementById("response").innerText = "Error fetching response.";
                }
            }
            
            function formatResponse(text) {
                console.log("Before Formatting:", text);
            
                // Replace **Bold Text** with a span that makes it black and bold
                text = text.replace(/\*\*(.*?)\*\*/g, '<span style="color: black; font-weight: bold;">$1</span>');
            
                // Convert bullet points (- or •) into an unordered list
                text = text.replace(/(?:^|\n)([-•])\s*(.*?)(?=\n|$)/g, '<li>$2</li>');
            
                // Wrap bullet points in <ul> if they exist
                if (text.includes("<li>")) {
                    text = text.replace(/(<li>.*?<\/li>)/gs, "<ul>$1</ul>");
                }
            
                // Preserve line breaks
                text = text.replace(/\n/g, "<br>");
            
                console.log("After Formatting:", text);
                return text;
            }
            
            
        
            document.getElementById("nextBtn").addEventListener("click", nextPage);

            //document.getElementById("askSelected").addEventListener("click", () => askGemini(false)); 
            document.getElementById("askFull").addEventListener("click", () => askGemini(true));
